<!DOCTYPE html>

<head>
  <title>Courses</title>
  <meta name="viewport" content="width=device-width">

  <style>
	* { font-family: sans-serif; cursor: default }
  </style>

  <script>
	const url = "https://cloud.seatable.io/api/v2.1/admin/view-external-links/"
	onload = function(){
		x = new XMLHttpRequest()
		x.open("GET", url)
		x.onload = function(){
			toHTML(x.response)
		}
		x.send()
	}
	
	toHTML = function(txt){
		console.log(txt)
	}
  </script>
</head>

<body></body>
</html>
